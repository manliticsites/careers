<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="css/style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Roles — Careers</title>
<meta name="description" content="Current openings. Read the full role brief and apply.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1e3a8a;    /* Deep Blue */
    --accent: #2563eb;     /* Bright Blue */
    --bg: #f8fafc;         /* Light Background */
    --ink: #000000;        /* Black Text */
    --stamp: #059669;      /* Green */
    --paper-raised: #ffffff;
  }

  * { box-sizing: border-box; }
  
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh; /* Ensures background covers full screen height */
    background-color: var(--bg); /* Perfectly fills the background */
    color: var(--ink);
    font-family: 'Inter', sans-serif;
  }

  /* This ensures your content stays centered and fits nicely */
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 24px;
    width: 100%; /* Ensures it fits mobile screens */
  }

  header.masthead {
    padding: 64px 24px 40px;
    text-align: center;
    background-color: var(--primary);
    color: #ffffff;
    width: 100%; /* Header spans full width */
  }

  /* Improved Ticket Layout */
  .ticket {
    background: var(--paper-raised);
    border: 1px solid #e2e8f0;
    margin-bottom: 22px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: grid;
    grid-template-columns: 1fr auto;
  }

  .ticket:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
  }

  /* Responsive Fix for mobile */
  @media (max-width: 768px) {
    .ticket { grid-template-columns: 1fr; }
  }
</style>

</head>

<body>

<header class="masthead">
  <div class="eyebrow">Now Hiring</div>
  <h1 class="company-name">Manlitics B2B ITES</h1>
  <p class="tagline">Read the brief, then apply — no account needed.</p>
</header>

<div class="wrap">
  <div class="board-intro">
    <h2>Open Positions</h2>
    <span class="count-tag" id="job-count">0 roles</span>
  </div>

  <div class="board" id="job-board">
    <!-- Job tickets are injected by script below -->
  </div>
</div>

<footer>
  Built for candidates arriving from LinkedIn. Questions? Email
  <a href="mailto:hr@manlitics.com.com">www.manlitics.com</a>
</footer>

<script>
  // ─────────────────────────────────────────────────────────
  // EDIT THIS LIST to add / remove job openings.
  // 1. Put the job description PDF in the /jobs folder.
  // 2. Add an entry below pointing to it.
  // 3. Commit + push — the page updates automatically.
  // ─────────────────────────────────────────────────────────
const jobs = [
    {
      id: "ENG-014",
      title: "Demand Generation Executive",
      location: "Remote (India)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Own core services powering our platform. 5+ years experience, strong systems design background.",
      pdf: "jobs/DGE-JD.pdf"
    },
    {
      id: "RES-007",
      title: "Research Analyst",
      location: "Pune, IN (onsite)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Focus on Contact Discovery and Pass Verification.",
      pdf: "jobs/Research-Analyst-JD.pdf"
    },
    {
      id: "MKT-002",
      title: "Digital Marketing Specialist",
      location: "Remote (India)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Manage end-to-end campaign strategies and performance analytics for B2B growth.",
      pdf: "jobs/Marketing-Specialist-JD.pdf"
    },

  ];


  const board = document.getElementById('job-board');
  const countTag = document.getElementById('job-count');

  if (jobs.length === 0) {
    board.innerHTML = `<div class="empty-state">No open roles right now — check back soon.</div>`;
    countTag.textContent = "0 roles";
  } else {
    countTag.textContent = jobs.length + (jobs.length === 1 ? " role" : " roles");
    board.innerHTML = jobs.map(job => `
      <article class="ticket">
        <div class="ticket-main">
          <div class="ticket-id">${job.id} · Posted ${job.posted}</div>
          <h3 class="ticket-title">${job.title}</h3>
          <div class="meta-row">
            <span>📍 ${job.location}</span>
            <span>🕒 ${job.type}</span>
          </div>
          <p class="ticket-desc">${job.blurb}</p>
        </div>
        <div class="ticket-stub">
          <span class="stamp">Open</span>
          <a class="view-btn" href="${job.pdf}" target="_blank" rel="noopener">View JD ↗</a>
        </div>
      </article>
    `).join('');
  }
</script>
<script src="js/script.js"></script>
</body>
</html>
