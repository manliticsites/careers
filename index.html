<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="css/style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Roles — Careers</title>
<meta name="description" content="Current openings. Read the full role brief and apply.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #f0f4f8;       /* Soft Light Gray-Blue background */
    --card-bg: #ffffff;        /* Crisp White cards */
    --text-main: #000000;      /* Pure Black text */
    --accent-blue: #1e3a8a;    /* Deep Navy */
    --accent-green: #065f46;   /* Deep Forest Green */
    --highlight: #2563eb;      /* Bright Action Blue */
    --shadow: 0 10px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; }
  
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden; /* Prevents horizontal scroll on mobile */
  }

  .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* Full-width Responsive Header */
  header.masthead {
    background: linear-gradient(135deg, var(--accent-blue), #1e293b);
    color: white;
    padding: 60px 20px;
    text-align: center;
    width: 100%;
  }

  /* Responsive Grid for Tickets */
  .board {
    display: grid;
    grid-template-columns: 1fr; /* Default mobile */
    gap: 20px;
    margin-top: 40px;
  }

  .ticket {
    background: var(--card-bg);
    border-left: 6px solid var(--accent-green); /* Green accent strip */
    padding: 24px;
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: fadeInUp 0.8s ease-out forwards;
  }

  .ticket:hover { transform: scale(1.02); box-shadow: 0 20px 30px rgba(0,0,0,0.15); }

  /* Motion Animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .view-btn {
    background: var(--highlight);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    transition: background 0.3s ease;
  }

  .view-btn:hover { background: var(--accent-green); }

  /* Mobile Responsive Fixes */
  @media (max-width: 600px) {
    .ticket { flex-direction: column; text-align: center; gap: 15px; }
    h1.company-name { font-size: 2rem !important; }
  }
</style>

</head>

<body>

<header class="masthead">
  <div class="eyebrow">Now Hiring</div>
  <h1 class="company-name">Manlitics B2B ITES</h1>
  <p class="tagline">Read the brief, then apply — no account needed.</p>
</header>

<div class="wrap">
  <div class="board-intro">
    <h2>Open Positions</h2>
    <span class="count-tag" id="job-count">0 roles</span>
  </div>

  <div class="board" id="job-board">
    <!-- Job tickets are injected by script below -->
  </div>
</div>

<footer>
  Built for candidates arriving from LinkedIn. Questions? Email
  <a href="mailto:hr@manlitics.com.com">www.manlitics.com</a>
</footer>

<script>
  // ─────────────────────────────────────────────────────────
  // EDIT THIS LIST to add / remove job openings.
  // 1. Put the job description PDF in the /jobs folder.
  // 2. Add an entry below pointing to it.
  // 3. Commit + push — the page updates automatically.
  // ─────────────────────────────────────────────────────────
const jobs = [
    {
      id: "ENG-014",
      title: "Demand Generation Executive",
      location: "Remote (India)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Own core services powering our platform. 5+ years experience, strong systems design background.",
      pdf: "jobs/DGE-JD.pdf"
    },
    {
      id: "RES-007",
      title: "Research Analyst",
      location: "Pune, IN (onsite)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Focus on Contact Discovery and Pass Verification.",
      pdf: "jobs/Research-Analyst-JD.pdf"
    },
    {
      id: "MKT-002",
      title: "Digital Marketing Specialist",
      location: "Remote (India)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Manage end-to-end campaign strategies and performance analytics for B2B growth.",
      pdf: "jobs/Marketing-Specialist-JD.pdf"
    },

  ];


  const board = document.getElementById('job-board');
  const countTag = document.getElementById('job-count');

  if (jobs.length === 0) {
    board.innerHTML = `<div class="empty-state">No open roles right now — check back soon.</div>`;
    countTag.textContent = "0 roles";
  } else {
    countTag.textContent = jobs.length + (jobs.length === 1 ? " role" : " roles");
    board.innerHTML = jobs.map(job => `
      <article class="ticket">
        <div class="ticket-main">
          <div class="ticket-id">${job.id} · Posted ${job.posted}</div>
          <h3 class="ticket-title">${job.title}</h3>
          <div class="meta-row">
            <span>📍 ${job.location}</span>
            <span>🕒 ${job.type}</span>
          </div>
          <p class="ticket-desc">${job.blurb}</p>
        </div>
        <div class="ticket-stub">
          <span class="stamp">Open</span>
          <a class="view-btn" href="${job.pdf}" target="_blank" rel="noopener">View JD ↗</a>
        </div>
      </article>
    `).join('');
  }
</script>
<script src="js/script.js"></script>
</body>
</html>
