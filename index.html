<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers — Manlitics B2B ITES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2164f3;
            --brand-dark: #164bc4;
            --ink: #1c2b3a;
            --ink-soft: #5b6b7c;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --green: #16a34a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); margin: 0; }
        
        /* Layout */
        .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        /* Hero */
        header.hero { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); padding: 60px 20px; text-align: center; color: white; }
        .search-bar { max-width: 640px; margin: 20px auto 0; background: #fff; border-radius: 8px; display: flex; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .search-bar input { flex: 1; border: none; padding: 15px; outline: none; }
        .search-bar button { background: var(--green); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: 600; border-radius: 0 8px 8px 0; }

        /* Job Cards */
        .board { margin-top: 40px; display: grid; gap: 20px; }
        .ticket { background: var(--card-bg); padding: 25px; border-radius: 10px; border: 1px solid #e1e6ec; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .ticket:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; }
        .view-btn { background: var(--brand); color: #fff; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600; }
        .apply-btn { background: var(--green); color: #fff; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600; }

        /* Why Join Section */
        .why-join { margin: 60px 0; text-align: center; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .feature { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header class="hero">
    <h1>Find your next role at Manlitics</h1>
    <div class="search-bar">
        <input type="text" id="q-title" placeholder="Job title...">
        <button id="search-btn">Search</button>
    </div>
</header>

<div class="wrap">
    <div class="board" id="job-board"></div>

    <section class="why-join">
        <h2>Why Join Us?</h2>
        <div class="features">
            <div class="feature"><h3>📈 Career Growth</h3><p>Work with experienced professionals.</p></div>
            <div class="feature"><h3>🌍 Global Clients</h3><p>Collaborate with B2B leaders.</p></div>
            <div class="feature"><h3>📚 Learning</h3><p>Continuous skill development.</p></div>
        </div>
    </section>
</div>

<script>
    const jobs = [
        { id: "ENG-014", title: "Demand Generation Executive", location: "Remote", posted: "Jul 2026", blurb: "Own core services powering our platform.", file: "jobs/DGE-JD.pdf" },
        { id: "RES-007", title: "Research Analyst", location: "Pune", posted: "Jul 2026", blurb: "Focus on Contact Discovery.", file: "jobs/Research-Analyst-JD.pdf" }
    ];

    const board = document.getElementById('job-board');
    function render(list) {
        board.innerHTML = list.map(j => `
            <article class="ticket">
                <div>
                    <h3>${j.title}</h3>
                    <p>${j.blurb}</p>
                    <small>📍 ${j.location} · ${j.posted}</small>
                </div>
                <div class="btn-group">
                    <a href="${j.file}" class="view-btn">View JD</a>
                    <a href="mailto:hr@manlitics.com?subject=Application for ${j.title}" class="apply-btn">Apply Now</a>
                </div>
            </article>
        `).join('');
    }
    document.getElementById('search-btn').onclick = () => {
        const val = document.getElementById('q-title').value.toLowerCase();
        render(jobs.filter(j => j.title.toLowerCase().includes(val)));
    };
    render(jobs);
</script>
</body>
</html>
