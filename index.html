<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careers — Manlitics B2B ITES</title>
<meta name="description" content="Search current openings at Manlitics B2B ITES.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #2164f3;
    --brand-dark: #164bc4;
    --ink: #1c2b3a;
    --ink-soft: #5b6b7c;
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --line: #e1e6ec;
    --shadow: 0 1px 3px rgba(28,43,58,0.08);
    --shadow-hover: 0 10px 24px rgba(28,43,58,0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans', Arial, sans-serif;
    scroll-behavior: smooth;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }

  /* ── Top nav ───────────────────────────────────────── */
  nav.topnav {
    background: #ffffff;
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    justify-content: center;
  }
  .nav-inner {
    width: 100%; max-width: 900px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-weight: 700; font-size: 20px; color: var(--brand);
    letter-spacing: -0.02em;
  }
  .nav-links { font-size: 14px; color: var(--ink-soft); }
  .nav-links a { color: var(--ink-soft); text-decoration: none; margin-left: 18px; }
  .nav-links a:hover { color: var(--brand); }

  /* ── Hero / search ─────────────────────────────────── */
  header.hero {
    background: var(--brand);
    background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dark) 100%);
    padding: 52px 20px 64px;
    text-align: center;
    color: #fff;
    animation: fadeInDown 0.6s ease both;
  }
  header.hero h1 {
    font-size: clamp(26px, 4.5vw, 38px);
    font-weight: 700;
    margin: 0 0 26px;
    letter-spacing: -0.01em;
  }
  .search-bar {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    display: flex;
    overflow: hidden;
    animation: fadeInUp 0.6s ease 0.15s both;
  }
  .search-bar input {
    flex: 1;
    border: none;
    padding: 15px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
  }
  .search-bar input + input { border-left: 1px solid var(--line); }
  .search-bar button {
    border: none;
    background: #14883f;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    padding: 0 26px;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .search-bar button:hover { background: #106b32; }

  /* ── Results header ────────────────────────────────── */
  .results-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 0 14px;
    flex-wrap: wrap; gap: 10px;
  }
  .results-bar h2 { font-size: 17px; margin: 0; font-weight: 600; color: var(--ink); }
  .results-count { font-size: 13px; color: var(--ink-soft); }

  /* ── Job cards ─────────────────────────────────────── */
  .board { display: grid; gap: 14px; padding-bottom: 80px; }

  .ticket {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 22px 24px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(16px);
    animation: fadeInUp 0.5s ease forwards;
    transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .ticket:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--brand);
    transform: translateY(-3px);
  }
  .ticket-id {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }
  .ticket-title {
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--brand-dark);
  }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 4px 14px;
    font-size: 13.5px; color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .ticket-desc { font-size: 14px; line-height: 1.5; color: var(--ink-soft); margin: 0; max-width: 50ch; }
  .ticket-action { flex-shrink: 0; }

  .view-btn {
    background: var(--brand);
    color: #fff;
    padding: 11px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    display: inline-block;
    white-space: nowrap;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .view-btn:hover { background: var(--brand-dark); transform: translateY(-1px); }
  .view-btn:focus-visible { outline: 3px solid #14883f; outline-offset: 2px; }

  .empty-state {
    padding: 60px 20px; text-align: center;
    color: var(--ink-soft); border: 1px dashed var(--line);
    border-radius: 8px; background: var(--card-bg);
    animation: fadeInUp 0.4s ease both;
  }

  footer {
    text-align: center; padding: 30px 24px 56px;
    font-size: 12.5px; color: var(--ink-soft);
    border-top: 1px solid var(--line);
  }
  footer a { color: var(--brand); }

  /* ── Motion ────────────────────────────────────────── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ticket, header.hero, .search-bar, .empty-state { animation: none; opacity: 1; transform: none; }
    .ticket:hover { transform: none; }
  }

  /* ── Mobile ────────────────────────────────────────── */
  @media (max-width: 600px) {
    .search-bar { flex-direction: column; border-radius: 10px; }
    .search-bar input + input { border-left: none; border-top: 1px solid var(--line); }
    .search-bar button { padding: 14px; }
    .ticket { flex-direction: column; align-items: stretch; text-align: left; }
    .ticket-action { width: 100%; }
    .view-btn { display: block; width: 100%; text-align: center; }
  }
</style>
</head>

<body>

<nav class="topnav">
  <div class="nav-inner">
    <div class="logo">Manlitics</div>
    <div class="nav-links"><a href="mailto:careers@manlitics.com">Contact</a></div>
  </div>
</nav>

<header class="hero">
  <h1>Find your next role at Manlitics B2B ITES</h1>
  <div class="search-bar">
    <input type="text" id="q-title" placeholder="Job title or keyword">
    <input type="text" id="q-location" placeholder="Location">
    <button id="search-btn">Search</button>
  </div>
</header>

<div class="wrap">
  <div class="results-bar">
    <h2>Open Positions</h2>
    <span class="results-count" id="job-count">0 jobs</span>
  </div>

  <div class="board" id="job-board">
    <!-- Jobs injected here -->
  </div>
</div>

<footer>
  Built for candidates arriving from LinkedIn. Questions? Email
  <a href="mailto:careers@manlitics.com">careers@manlitics.com</a>
</footer>

<script>
  // ─────────────────────────────────────────────────────────
  // EDIT THIS LIST to add / remove job openings.
  // 1. Put the job description file (PDF, Word, etc.) in /jobs.
  // 2. Add an entry below pointing to it.
  // 3. Commit — the page updates automatically.
  // ─────────────────────────────────────────────────────────
  const jobs = [
    {
      id: "ENG-014",
      title: "Demand Generation Executive",
      location: "Remote (India)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Own core services powering our platform. 5+ years experience, strong systems design background.",
      file: "jobs/DGE-JD.pdf"
    },
    {
      id: "RES-007",
      title: "Research Analyst",
      location: "Pune, IN (onsite)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Focus on Contact Discovery and Pass Verification.",
      file: "jobs/Research-Analyst-JD.pdf"
    },
    {
      id: "MKT-002",
      title: "Digital Marketing Specialist",
      location: "Remote (India)",
      type: "Full-time",
      posted: "Jul 2026",
      blurb: "Manage end-to-end campaign strategies and performance analytics for B2B growth.",
      file: "jobs/Marketing-Specialist-JD.pdf"
    }
  ];

  function fileMeta(path) {
    const ext = (path.split('.').pop() || '').toLowerCase();
    const map = { pdf: "View JD", doc: "Download JD", docx: "Download JD", txt: "View JD", rtf: "Download JD" };
    return map[ext] || "Download JD";
  }

  const board = document.getElementById('job-board');
  const countTag = document.getElementById('job-count');
  const titleInput = document.getElementById('q-title');
  const locInput = document.getElementById('q-location');

  function renderJobs(list) {
    if (list.length === 0) {
      board.innerHTML = `<div class="empty-state">No matching roles right now — try a different search.</div>`;
      countTag.textContent = "0 jobs";
      return;
    }
    countTag.textContent = list.length + (list.length === 1 ? " job" : " jobs");
    board.innerHTML = list.map((job, i) => `
      <article class="ticket" style="animation-delay:${i * 0.08}s">
        <div class="ticket-info">
          <div class="ticket-id">${job.id} · Posted ${job.posted}</div>
          <h3 class="ticket-title">${job.title}</h3>
          <div class="meta-row">
            <span>📍 ${job.location}</span>
            <span>🕒 ${job.type}</span>
          </div>
          <p class="ticket-desc">${job.blurb}</p>
        </div>
        <div class="ticket-action">
          <a class="view-btn" href="${job.file}" target="_blank" rel="noopener">${fileMeta(job.file)} ↗</a>
        </div>
      </article>
    `).join('');
  }

  function applyFilter() {
    const t = titleInput.value.trim().toLowerCase();
    const l = locInput.value.trim().toLowerCase();
    const filtered = jobs.filter(job =>
      job.title.toLowerCase().includes(t) &&
      job.location.toLowerCase().includes(l)
    );
    renderJobs(filtered);
  }

  document.getElementById('search-btn').addEventListener('click', applyFilter);
  titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyFilter(); });
  locInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyFilter(); });

  renderJobs(jobs);
</script>

</body>
</html>
