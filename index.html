<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers — Manlitics B2B ITES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2164f3; --brand-dark: #164bc4;
            --ink: #1c2b3a; --bg: #f4f6f9;
            --green: #16a34a; --red: #dc2626;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); margin: 0; line-height: 1.6; }
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        header { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: white; padding: 60px 20px; text-align: center; }
        
        .board { display: grid; gap: 20px; margin-top: 40px; }
        .ticket { background: white; padding: 25px; border-radius: 12px; border-left: 6px solid var(--brand); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .ticket:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px; display: inline-block; text-transform: uppercase; }
        .open { background: #dcfce7; color: var(--green); }
        .closed { background: #fee2e2; color: var(--red); }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; min-width: 110px; text-align: center; }
        .view-btn { background: var(--brand); color: white; }
        .view-btn:hover { background: var(--brand-dark); }
        .apply-btn { background: var(--green); color: white; }
        .btn-closed { background: #94a3b8 !important; cursor: default; color: #ffffff; }

        footer { background: #1f2937; color: #d1d5db; padding: 60px 20px; margin-top: 80px; }
        footer a { color: #60a5fa; text-decoration: none; }
        
        @media (max-width: 600px) {
            .ticket { flex-direction: column; text-align: center; }
            .btn-group { width: 100%; flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1>Careers at Manlitics B2B ITES</h1>
</header>

<div class="wrap">
    <div class="board" id="job-board"></div>
</div>

<footer>
    <div class="wrap">
        <h2>Contact HR</h2>
        <p>📧 <strong>Apply:</strong> <a href="mailto:hr@manlitics.com">hr@manlitics.com</a></p>
        <p>📱 <strong>WhatsApp:</strong> <a href="https://wa.me/917391094394" target="_blank">+91 73910 94394</a></p>
        <p>☎ <strong>Office:</strong> 077588 86468</p>
        <h3>Office Address</h3>
        <p>EFC Office Space – Business Center, 1st Floor, Phase 1, Rajiv Gandhi Infotech Park, Hinjawadi, Pimpri-Chinchwad, Maharashtra 411057</p>
    </div>
</footer>

<script>
    const jobs = [
        { id: "ENG-014", title: "Demand Generation Executive", location: "Remote", status: "Open", file: "jobs/DGE-JD.pdf" },
        { id: "RES-007", title: "Research Analyst", location: "Pune", status: "Closed", file: "jobs/Research-Analyst-JD.pdf" }
    ];

    const board = document.getElementById('job-board');
    board.innerHTML = jobs.map(j => {
        const isClosed = j.status === 'Closed';
        return `
        <article class="ticket">
            <div>
                <span class="status-badge ${j.status.toLowerCase()}">${j.status}</span>
                <h3>${j.title}</h3>
                <small>📍 ${j.location}</small>
            </div>
            <div class="btn-group">
                <a href="${j.file}" class="btn view-btn">View JD</a>
                ${isClosed ? 
                  `<span class="btn apply-btn btn-closed">Position Closed</span>` : 
                  `<a href="mailto:hr@manlitics.com?subject=Application for ${j.title}" class="btn apply-btn">Apply Now</a>`
                }
            </div>
        </article>`;
    }).join('');
</script>
</body>
</html>
